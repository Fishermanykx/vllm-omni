# HunyuanImage-3.0-Instruct DiT-only deploy.
#
# Use this when AR and DiT are deployed as independent services. This file
# resolves to stage 1 only, preserving the downstream stage id used by the
# two-stage KV-reuse topology without forcing stage 0 to launch locally.
pipeline: hunyuan_image3_dit
trust_remote_code: true
distributed_executor_backend: mp
enable_prefix_caching: false
async_chunk: false

stages:
  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.9
    enforce_eager: true
    devices: "4,5,6,7"
    model_stage: diffusion
    engine_output_type: image
    vae_use_slicing: false
    vae_use_tiling: false
    cache_backend:
    cache_config:
    enable_cache_dit_summary: false
    omni_kv_config:
      need_recv_cache: true
    parallel_config:
      pipeline_parallel_size: 1
      data_parallel_size: 1
      tensor_parallel_size: 4
      enable_expert_parallel: true
      sequence_parallel_size: 1
      ulysses_degree: 1
      ring_degree: 1
      cfg_parallel_size: 1
      vae_patch_parallel_size: 1
      use_hsdp: false
      hsdp_shard_size: -1
      hsdp_replicate_size: 1
    default_sampling_params:
      seed: 42
      num_inference_steps: 50
      guidance_scale: 2.5

platforms:
  npu:
    stages:
      - stage_id: 1
        gpu_memory_utilization: 0.65
        devices: "4,5,6,7"
        max_num_batched_tokens: 32768
        parallel_config:
          tensor_parallel_size: 4
          enable_expert_parallel: true

  xpu:
    stages:
      - stage_id: 1
        gpu_memory_utilization: 0.9
        devices: "0,1,2,3,4,5,6,7"
        quantization: fp8
        parallel_config:
          pipeline_parallel_size: 1
          data_parallel_size: 1
          tensor_parallel_size: 8
          enable_expert_parallel: true
          sequence_parallel_size: 1
          ulysses_degree: 1
          ring_degree: 1
          cfg_parallel_size: 1
          vae_patch_parallel_size: 1
          use_hsdp: false
          hsdp_shard_size: -1
          hsdp_replicate_size: 1
